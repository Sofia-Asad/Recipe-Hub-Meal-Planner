<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Hub & Meal Planner</title>
</head>
<body>
    <nav>
        <div class="logo">Recipe<span>Hub</span></div>
        <ul class="nav-links">
